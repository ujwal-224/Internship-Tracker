<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CareerPilot - Add Application</title>
    <!-- Tailwind CSS with Forms and Container Queries -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Link to Tailwind Custom Config & External Style -->
    <script src="shared.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "surface-dim": "#d8dadc",
                        "secondary": "#505f76",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#e4f2ff",
                        "on-background": "#191c1e",
                        "on-surface": "#191c1e",
                        "on-secondary-fixed": "#0b1c30",
                        "tertiary": "#005a82",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#b4c5ff",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-surface-variant": "#434655",
                        "inverse-primary": "#b4c5ff",
                        "outline": "#737686",
                        "surface-container-highest": "#e0e3e5",
                        "primary-fixed": "#dbe1ff",
                        "surface-bright": "#f7f9fb",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "tertiary-fixed": "#c9e6ff",
                        "primary": "#004ac6",
                        "tertiary-fixed-dim": "#89ceff",
                        "inverse-surface": "#2d3133",
                        "surface-container": "#eceef0",
                        "secondary-container": "#d0e1fb",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-container": "#0074a6",
                        "secondary-fixed": "#d3e4fe",
                        "on-primary-fixed": "#00174b",
                        "on-primary-container": "#eeefff",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed": "#001e2f",
                        "background": "#f7f9fb",
                        "surface-container-high": "#e6e8ea",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "surface-variant": "#e0e3e5",
                        "primary-container": "#2563eb",
                        "surface": "#f7f9fb",
                        "on-secondary-fixed-variant": "#38485d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sidebar-width": "260px",
                        "unit": "8px",
                        "gutter": "16px",
                        "container-padding": "24px",
                        "card-gap": "20px"
                    },
                    "fontFamily": {
                        "headline-xl-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-xl-mobile": ["30px", {"lineHeight": "38px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "14px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-xl": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
    <link href="styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface antialiased overflow-hidden h-screen flex dark:text-slate-100">

    <!-- Mobile Navigation Backdrop -->
    <div id="mobile-sidebar-backdrop" class="fixed inset-0 bg-black/40 z-40 hidden transition-opacity duration-200"></div>

    <!-- NavigationDrawer -->
    <nav id="sidebar" class="fixed left-0 top-0 h-full w-sidebar-width bg-white dark:bg-slate-900 shadow-sm z-50 flex flex-col py-8 px-4 gap-unit border-r border-slate-100 dark:border-slate-800 transition-transform duration-300 -translate-x-full md:translate-x-0">
        <div class="px-4 mb-8 flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <div class="sidebar-logo-wrap">
                    <span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'FILL' 1;">send</span>
                </div>
                <span class="font-bold text-xl bg-gradient-to-r from-violet-600 to-blue-600 dark:from-violet-400 dark:to-blue-400 bg-clip-text text-transparent">CareerPilot</span>
            </div>
            <button id="close-sidebar-btn" class="md:hidden p-1 rounded-full text-secondary hover:bg-surface-container dark:hover:bg-slate-800">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <ul class="flex flex-col gap-1 flex-grow">
            <li>
                <a href="dashboard.html" class="nav-link flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">
                    <span class="material-symbols-outlined text-label-md">dashboard</span>
                    <span class="font-label-md text-label-md">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="applications.html" class="nav-link flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">
                    <span class="material-symbols-outlined text-label-md">list_alt</span>
                    <span class="font-label-md text-label-md">Applications</span>
                </a>
            </li>
            <li>
                <a href="board.html" class="nav-link flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">
                    <span class="material-symbols-outlined text-label-md">view_kanban</span>
                    <span class="font-label-md text-label-md">Board</span>
                </a>
            </li>
            <li>
                <a href="add-new.html" class="nav-link nav-active flex items-center gap-3 px-4 py-3">
                    <span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                    <span class="font-label-md text-label-md">Add New</span>
                </a>
            </li>
        </ul>
        <div class="mt-auto">
            <a href="profile.html" class="nav-link flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">
                <span class="material-symbols-outlined text-label-md">person</span>
                <span class="font-label-md text-label-md">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 md:ml-sidebar-width h-full overflow-y-auto bg-slate-50/50 dark:bg-slate-950/50 flex flex-col">
        <!-- Page Container -->
        <div class="p-container-padding flex-1 max-w-5xl mx-auto w-full flex flex-col justify-center items-center gap-8 page-fade-in py-12">
            <div class="max-w-3xl w-full">
                <div class="mb-8 text-left">
                    <h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100">New Application</h2>
                    <p class="text-slate-500 dark:text-slate-400 mt-1">Track a new opportunity by entering the details below.</p>
                </div>

                <form id="new-app-form" class="glass-card rounded-2xl p-8 flex flex-col gap-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="form-company" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Company Name</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">corporate_fare</span>
                                <input id="form-company" required class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 font-body-sm text-body-sm transition-all" placeholder="e.g. Google" type="text"/>
                            </div>
                        </div>
                        <div>
                            <label for="form-role" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Role/Position</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">work</span>
                                <input id="form-role" required class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 font-body-sm text-body-sm transition-all" placeholder="e.g. UX Designer Intern" type="text"/>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="form-url" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Application Link</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">link</span>
                            <input id="form-url" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 font-body-sm text-body-sm transition-all" placeholder="https://..." type="url"/>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="form-status" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Current Status</label>
                            <div class="relative">
                                <select id="form-status" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 font-body-sm text-body-sm appearance-none">
                                    <option value="Applied">Applied</option>
                                    <option value="Online Assessment">Online Assessment</option>
                                    <option value="Interviewing">Interviewing</option>
                                    <option value="Offer">Selected (Offer)</option>
                                    <option value="Rejected">Rejected</option>
                                </select>
                                <span class="material-symbols-outlined absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                            </div>
                        </div>
                        <div>
                            <label for="form-date" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Date Applied</label>
                            <input id="form-date" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 font-body-sm text-body-sm" type="date"/>
                        </div>
                    </div>

                    <div class="hidden">
                        <input id="form-location" type="hidden" value="Remote"/>
                        <input id="form-salary" type="hidden" value=""/>
                    </div>

                    <div>
                        <label for="form-notes" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Notes</label>
                        <textarea id="form-notes" rows="4" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 font-body-sm text-body-sm" placeholder="Any specific requirements, recruiter names, or personal thoughts..."></textarea>
                    </div>

                    <div class="flex justify-end items-center gap-4 pt-6 border-t border-slate-100 dark:border-slate-800/60">
                        <button id="form-cancel-btn" type="button" onclick="window.location.href='dashboard.html'" class="text-violet-600 hover:text-violet-700 dark:text-violet-450 dark:hover:text-violet-400 font-semibold text-sm transition-colors">
                            Cancel
                        </button>
                        <button type="submit" class="px-6 py-2.5 btn-primary font-semibold text-sm transition-all shadow-sm active:scale-95">
                            Save Application
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Page Specific Script -->
    <script>
        const form = document.getElementById("new-app-form");

        // Set default date to today
        document.getElementById("form-date").value = new Date().toISOString().substring(0, 10);

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            
            const newApp = {
                id: Date.now().toString(),
                company: document.getElementById("form-company").value.trim(),
                role: document.getElementById("form-role").value.trim(),
                status: document.getElementById("form-status").value,
                date: document.getElementById("form-date").value,
                location: document.getElementById("form-location").value.trim(),
                salary: document.getElementById("form-salary").value.trim(),
                url: document.getElementById("form-url").value.trim(),
                notes: document.getElementById("form-notes").value.trim()
            };

            const apps = getApplications();
            apps.unshift(newApp);
            saveApplications(apps);
            
            showToast(`Added ${newApp.company} application successfully!`);
            
            // Redirect back to dashboard page
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        });
    </script>
</body>
</html>
